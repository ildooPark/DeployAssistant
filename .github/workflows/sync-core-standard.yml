name: Sync Core.Standard with Core

on:
  push:
    branches:
      - main
    paths:
      - 'DeployAssistant.Core/**/*.cs'
      - 'DeployAssistant.Core.Standard/DeployAssistant.Core.Standard.csproj'
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  sync:
    name: Check & Sync Core.Standard
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Core.Standard.csproj with Core
        id: sync
        shell: pwsh
        run: |
          # Files that DeployAssistant.Core.Standard intentionally overrides
          # (it ships its own netstandard2.0-compatible versions of these)
          $overrideFiles = @(
            'DataComponent/FileManager.cs',
            'DataComponent/MetaDataManager.cs',
            'Utils/FileHandlerTool.cs',
            'Utils/HashTool.cs'
          )

          $coreDir    = 'DeployAssistant.Core'
          $csprojPath = 'DeployAssistant.Core.Standard/DeployAssistant.Core.Standard.csproj'

          # Collect all .cs files in Core (relative to $coreDir)
          $coreFiles = Get-ChildItem -Path $coreDir -Recurse -Filter '*.cs' |
            ForEach-Object {
              ($_.FullName -replace [regex]::Escape((Resolve-Path $coreDir).Path + [IO.Path]::DirectorySeparatorChar), '') `
                -replace '\\', '/'
            }

          # Load csproj XML
          [xml]$csproj = Get-Content $csprojPath -Encoding UTF8

          # Collect all currently linked paths from Core
          $linked = @()
          foreach ($ig in $csproj.Project.ItemGroup) {
            foreach ($compile in $ig.Compile) {
              $inc = $compile.Include
              if ($inc -match '\.\./DeployAssistant\.Core/(.+)') {
                $linked += $Matches[1] -replace '\\', '/'
              }
            }
          }

          # Determine which Core files are missing from Core.Standard
          $missing = $coreFiles | Where-Object {
            $f = $_
            ($overrideFiles -notcontains $f) -and ($linked -notcontains $f)
          }

          if ($missing.Count -eq 0) {
            Write-Host "✅ Core.Standard is already in sync with Core."
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          Write-Host "⚠️  Found $($missing.Count) unlinked file(s) in Core.Standard:"
          $missing | ForEach-Object { Write-Host "   + $_" }

          # Group missing files by subfolder so they can be inserted into the
          # correct <ItemGroup> (or a new one if no matching group exists).
          # Strategy: append a new <ItemGroup> at the end of the project.
          $nsResolver = New-Object System.Xml.XmlNamespaceManager($csproj.NameTable)

          # Build a mapping of subfolder -> existing ItemGroup that has Core links
          $groupMap = @{}
          foreach ($ig in $csproj.Project.ItemGroup) {
            foreach ($compile in $ig.Compile) {
              $inc = $compile.Include
              if ($inc -match '\.\./DeployAssistant\.Core/([^/]+)/') {
                $folder = $Matches[1]
                $groupMap[$folder] = $ig
              }
            }
          }

          foreach ($file in $missing) {
            $parts  = $file -split '/', 2
            $folder = if ($parts.Count -gt 1) { $parts[0] } else { '' }
            $relPath = "../DeployAssistant.Core/$file"
            $linkPath = $file

            $newCompile = $csproj.CreateElement('Compile')
            $newCompile.SetAttribute('Include', $relPath)
            $linkEl = $csproj.CreateElement('Link')
            $linkEl.InnerText = $linkPath
            $newCompile.AppendChild($linkEl) | Out-Null

            if ($groupMap.ContainsKey($folder)) {
              # Add to the existing ItemGroup for this folder
              $groupMap[$folder].AppendChild($newCompile) | Out-Null
            } else {
              # Create a new ItemGroup
              $newGroup = $csproj.CreateElement('ItemGroup')
              $newGroup.AppendChild($newCompile) | Out-Null
              $csproj.Project.AppendChild($newGroup) | Out-Null
              if ($folder) { $groupMap[$folder] = $newGroup }
            }
          }

          # Save with UTF-8 BOM to match the existing file encoding
          $settings = New-Object System.Xml.XmlWriterSettings
          $settings.Indent = $true
          $settings.IndentChars = '  '
          $settings.Encoding = [System.Text.UTF8Encoding]::new($true)
          $settings.OmitXmlDeclaration = $false
          $writer = [System.Xml.XmlWriter]::Create($csprojPath, $settings)
          $csproj.Save($writer)
          $writer.Close()

          Write-Host "✅ Updated $csprojPath with $($missing.Count) new link(s)."
          "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "missing_files=$($missing -join ', ')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Pull Request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/sync-core-standard
          commit-message: "chore: sync Core.Standard.csproj with new Core files"
          title: "chore: sync DeployAssistant.Core.Standard with DeployAssistant.Core"
          body: |
            ## 🔄 Automated Core.Standard Sync

            New `.cs` files were detected in `DeployAssistant.Core` that are not yet
            referenced in `DeployAssistant.Core.Standard.csproj`.

            **Added links for:**
            ${{ steps.sync.outputs.missing_files }}

            > Files intentionally overridden in Core.Standard (`FileManager.cs`,
            > `MetaDataManager.cs`, `FileHandlerTool.cs`, `HashTool.cs`) are excluded
            > from auto-linking. If a new file needs a .NET Standard–compatible
            > override, add it manually to Core.Standard instead.

            ---
            _Generated by the [Sync Core.Standard](.github/workflows/sync-core-standard.yml) workflow._
          labels: maintenance,automated
          delete-branch: true

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore DeployAssistant.sln

      - name: Publish WPF app (self-contained, win-x64)
        run: |
          dotnet publish DeployAssistant/DeployAssistant.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o ./publish/DeployAssistant

      - name: Zip build output
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/DeployAssistant/* `
            -DestinationPath DeployAssistant-build.zip -Force

      - name: Zip source code
        shell: pwsh
        run: |
          $exclude = @('.git', 'publish', 'DeployAssistant-build.zip')
          $items = Get-ChildItem -Path . -Exclude $exclude
          Compress-Archive -Path $items -DestinationPath DeployAssistant-src.zip -Force

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DeployAssistant-src.zip
            DeployAssistant-build.zip
          generate_release_notes: true

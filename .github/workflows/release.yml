name: Release

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore DeployAssistant.sln

      - name: Run tests
        run: dotnet test DeployAssistant.sln --configuration Release --no-restore --verbosity normal

  build:
    name: Build Artifacts
    needs: test
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore DeployAssistant.sln

      - name: Publish WPF app (self-contained, win-x64)
        run: |
          dotnet publish DeployAssistant/DeployAssistant.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o ./publish/DeployAssistant

      - name: Publish CLI (self-contained, win-x64)
        run: |
          dotnet publish DeployAssistant.CLI/DeployAssistant.CLI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o ./publish/DeployAssistant.CLI

      - name: Zip WPF build output
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/DeployAssistant/* `
            -DestinationPath DeployAssistant-build.zip -Force

      - name: Zip CLI build output
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/DeployAssistant.CLI/* `
            -DestinationPath DeployAssistant-CLI-build.zip -Force

      - name: Zip source code
        shell: pwsh
        run: |
          $exclude = @('.git', 'publish', 'DeployAssistant-build.zip', 'DeployAssistant-CLI-build.zip')
          $items = Get-ChildItem -Path . -Exclude $exclude
          Compress-Archive -Path $items -DestinationPath DeployAssistant-src.zip -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeployAssistant-builds
          path: |
            DeployAssistant-src.zip
            DeployAssistant-build.zip
            DeployAssistant-CLI-build.zip

  release:
    name: Create GitHub Release
    if: github.event_name == 'push' && github.ref_type == 'branch'
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: DeployAssistant-builds
          path: .

      - name: Generate categorized changelog
        id: changelog
        shell: pwsh
        run: |
          # Derive release tag from the short commit SHA
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $currentTag = "build-$shortSha"
          echo "tag_name=$currentTag" >> $env:GITHUB_OUTPUT

          # Find previous tag to determine the commit range
          $prevTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          if ($LASTEXITCODE -ne 0 -or -not $prevTag) {
            $range = "HEAD"
            $prevTagDisplay = "(initial release)"
          } else {
            $range = "$prevTag..HEAD"
            $prevTagDisplay = $prevTag
          }

          # Collect commits in range
          $commits = git log $range --pretty=format:"%s|%h|%an" --no-merges

          $hotfixes    = [System.Collections.Generic.List[string]]::new()
          $bugFixes    = [System.Collections.Generic.List[string]]::new()
          $features    = [System.Collections.Generic.List[string]]::new()
          $performance = [System.Collections.Generic.List[string]]::new()
          $other       = [System.Collections.Generic.List[string]]::new()

          foreach ($line in $commits) {
            if (-not $line) { continue }
            $parts   = $line -split '\|', 3
            $subject = $parts[0].Trim()
            $hash    = $parts[1].Trim()
            $author  = if ($parts.Count -ge 3) { $parts[2].Trim() } else { '' }
            $entry   = "- $subject (\`$hash\`) — $author"

            if ($subject -match '^hotfix(\([^)]+\))?!?:') {
              $hotfixes.Add($entry)
            } elseif ($subject -match '^fix(\([^)]+\))?!?:') {
              $bugFixes.Add($entry)
            } elseif ($subject -match '^(feat|feature|improve|improvement|enhance)(\([^)]+\))?!?:') {
              $features.Add($entry)
            } elseif ($subject -match '^(perf|refactor|chore|build|ci)(\([^)]+\))?!?:') {
              $performance.Add($entry)
            } else {
              $other.Add($entry)
            }
          }

          # Build markdown body
          $md = @()
          $md += "## 📦 Release $currentTag"
          $md += ""
          $md += "> Changes since **$prevTagDisplay**"
          $md += "> Commit: **$(git rev-parse --short HEAD)**"
          $md += ""

          # Summary counts
          $total = $hotfixes.Count + $bugFixes.Count + $features.Count + $performance.Count + $other.Count
          $md += "### 📊 Summary"
          $md += ""
          $md += "| Category | Count |"
          $md += "|---|---|"
          if ($hotfixes.Count    -gt 0) { $md += "| 🚨 Hotfixes | $($hotfixes.Count) |" }
          if ($bugFixes.Count    -gt 0) { $md += "| 🐛 Bug Fixes | $($bugFixes.Count) |" }
          if ($features.Count    -gt 0) { $md += "| ✨ Features & Improvements | $($features.Count) |" }
          if ($performance.Count -gt 0) { $md += "| ⚡ Performance & Maintenance | $($performance.Count) |" }
          if ($other.Count       -gt 0) { $md += "| 🔧 Other Changes | $($other.Count) |" }
          $md += "| **Total** | **$total** |"
          $md += ""

          if ($hotfixes.Count -gt 0) {
            $md += "### 🚨 Hotfixes"
            $md += ""
            $hotfixes | ForEach-Object { $md += $_ }
            $md += ""
          }

          if ($bugFixes.Count -gt 0) {
            $md += "### 🐛 Bug Fixes"
            $md += ""
            $bugFixes | ForEach-Object { $md += $_ }
            $md += ""
          }

          if ($features.Count -gt 0) {
            $md += "### ✨ Features & Improvements"
            $md += ""
            $features | ForEach-Object { $md += $_ }
            $md += ""
          }

          if ($performance.Count -gt 0) {
            $md += "### ⚡ Performance & Maintenance"
            $md += ""
            $performance | ForEach-Object { $md += $_ }
            $md += ""
          }

          if ($other.Count -gt 0) {
            $md += "### 🔧 Other Changes"
            $md += ""
            $other | ForEach-Object { $md += $_ }
            $md += ""
          }

          if ($total -eq 0) {
            $md += "_No conventional commits found in this release._"
            $md += ""
          }

          $md += "---"
          $md += "_Generated by GitHub Actions · $currentTag_"

          $body = $md -join "`n"
          $body | Out-File -FilePath release_notes.md -Encoding utf8
          Write-Host "Changelog generated ($total commits categorized)."

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.changelog.outputs.tag_name }}
          body_path: release_notes.md
          files: |
            DeployAssistant-src.zip
            DeployAssistant-build.zip
            DeployAssistant-CLI-build.zip
